<!-- neon rooftop lines -->
<g filter="url(#glow)">
  <line x1="92"  y1="400" x2="202" y2="400" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
  <line x1="288" y1="370" x2="408" y2="370" stroke="#ff006e" stroke-width="2" opacity=".8"/>
  <line x1="504" y1="390" x2="600" y2="390" stroke="#00ff88" stroke-width="1.5" opacity=".7"/>
</g>

<!-- ground reflection -->
<rect x="0" y="720" width="600" height="80" fill="#04041a" opacity=".85"/>
<g filter="url(#glow2)" opacity=".18">
  <ellipse cx="130" cy="750" rx="90"  ry="12" fill="#00d4ff"/>
  <ellipse cx="360" cy="755" rx="70"  ry="9"  fill="#ff006e"/>
  <ellipse cx="520" cy="748" rx="55"  ry="8"  fill="#00ff88"/>
