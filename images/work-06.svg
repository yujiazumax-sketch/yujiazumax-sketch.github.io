<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
<defs>
  <linearGradient id="sky6" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#1a0030"/>
    <stop offset="50%"  stop-color="#3a0060"/>
    <stop offset="80%"  stop-color="#5a0080"/>
    <stop offset="100%" stop-color="#080010"/>
  </linearGradient>
  <linearGradient id="gridg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#ff006e" stop-opacity=".9"/>
    <stop offset="100%" stop-color="#ff006e" stop-opacity=".15"/>
  </linearGradient>
  <radialGradient id="sun6" cx="50%" cy="0%" r="60%">
    <stop offset="0%"   stop-color="#ff6600" stop-opacity=".9"/>
    <stop offset="40%"  stop-color="#ff0066" stop-opacity=".6"/>
    <stop offset="100%" stop-color="#8800ff" stop-opacity="0"/>
  </radialGradient>
  <filter id="gf6"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="600" height="800" fill="url(#sky6)"/>

<!-- Sun / horizon glow -->
<rect x="0" y="0" width="600" height="800" fill="url(#sun6)" opacity=".7"/>

<!-- Horizon line -->
<line x1="0" y1="400" x2="600" y2="400" stroke="#ff006e" stroke-width="2" opacity=".8" filter="url(#gf6)"/>

<!-- Sun circle (half) -->
<clipPath id="horizClip"><rect x="0" y="0" width="600" height="400"/></clipPath>
<g clip-path="url(#horizClip)" filter="url(#gf6)">
  <circle cx="300" cy="400" r="100" fill="none" stroke="#ff6600" stroke-width="3" opacity=".9"/>
  <circle cx="300" cy="400" r="100" fill="#ff3300" opacity=".15"/>
  <!-- Horizontal lines through sun -->
  <line x1="200" y1="350" x2="400" y2="350" stroke="#ff4400" stroke-width="2" opacity=".7"/>
  <line x1="205" y1="360" x2="395" y2="360" stroke="#ff4400" stroke-width="1.5" opacity=".65"/>
  <line x1="210" y1="370" x2="390" y2="370" stroke="#ff4400" stroke-width="1.5" opacity=".6"/>
  <line x1="215" y1="380" x2="385" y2="380" stroke="#ff5500" stroke-width="1.5" opacity=".55"/>
  <line x1="218" y1="390" x2="382" y2="390" stroke="#ff6600" stroke-width="1" opacity=".5"/>
</g>

<!-- Perspective grid - horizontal lines -->
<g stroke="url(#gridg)" fill="none">
  <line x1="0" y1="410" x2="600" y2="410" stroke-width="1.2" opacity=".9"/>
  <line x1="0" y1="435" x2="600" y2="435" stroke-width="1"   opacity=".8"/>
  <line x1="0" y1="470" x2="600" y2="470" stroke-width=".9"  opacity=".72"/>
  <line x1="0" y1="518" x2="600" y2="518" stroke-width=".8"  opacity=".65"/>
  <line x1="0" y1="580" x2="600" y2="580" stroke-width=".7"  opacity=".58"/>
  <line x1="0" y1="658" x2="600" y2="658" stroke-width=".6"  opacity=".5"/>
  <line x1="0" y1="755" x2="600" y2="755" stroke-width=".5"  opacity=".42"/>
</g>

<!-- Perspective grid - vertical lines (converging to vanishing point 300,400) -->
<g stroke="#ff006e" fill="none" opacity=".55">
  <line x1="300" y1="400" x2="300" y2="800" stroke-width="1.2"/>
  <line x1="300" y1="400" x2="260" y2="800" stroke-width="1"/>
  <line x1="300" y1="400" x2="220" y2="800" stroke-width="1"/>
  <line x1="300" y1="400" x2="180" y2="800" stroke-width=".9"/>
  <line x1="300" y1="400" x2="140" y2="800" stroke-width=".8"/>
  <line x1="300" y1="400" x2="100" y2="800" stroke-width=".7"/>
  <line x1="300" y1="400" x2="60"  y2="800" stroke-width=".6"/>
  <line x1="300" y1="400" x2="20"  y2="800" stroke-width=".5"/>
  <line x1="300" y1="400" x2="0"   y2="760" stroke-width=".4"/>
  <line x1="300" y1="400" x2="340" y2="800" stroke-width="1"/>
  <line x1="300" y1="400" x2="380" y2="800" stroke-width="1"/>
  <line x1="300" y1="400" x2="420" y2="800" stroke-width=".9"/>
  <line x1="300" y1="400" x2="460" y2="800" stroke-width=".8"/>
  <line x1="300" y1="400" x2="500" y2="800" stroke-width=".7"/>
  <line x1="300" y1="400" x2="540" y2="800" stroke-width=".6"/>
  <line x1="300" y1="400" x2="580" y2="800" stroke-width=".5"/>
  <line x1="300" y1="400" x2="600" y2="760" stroke-width=".4"/>
</g>

<!-- Stars -->
<g fill="#ffffff">
  <circle cx="60"  cy="60"  r="1.2" opacity=".8"/>
  <circle cx="150" cy="30"  r="1"   opacity=".7"/>
  <circle cx="250" cy="80"  r="1.5" opacity=".9"/>
  <circle cx="350" cy="45"  r="1"   opacity=".6"/>
  <circle cx="450" cy="70"  r="1.2" opacity=".8"/>
  <circle cx="540" cy="40"  r="1"   opacity=".7"/>
  <circle cx="100" cy="150" r=".8"  opacity=".5"/>
  <circle cx="500" cy="160" r=".8"  opacity=".5"/>
  <circle cx="200" cy="200" r="1"   opacity=".55"/>
  <circle cx="420" cy="190" r=".9"  opacity=".55"/>
  <circle cx="80"  cy="280" r=".7"  opacity=".4"/>
  <circle cx="520" cy="250" r=".7"  opacity=".4"/>
</g>

<!-- Neon mountains silhouette left -->
<g fill="#0d0020" opacity=".9">
  <polygon points="0,400 0,340 60,300 120,360 160,310 220,350 260,400"/>
  <polygon points="340,400 380,350 440,310 480,360 540,300 600,340 600,400"/>
</g>

<!-- Mountain outline glow -->
<g filter="url(#gf6)" opacity=".5">
  <polyline points="0,340 60,300 120,360 160,310 220,350 260,400" fill="none" stroke="#ff006e" stroke-width="1"/>
  <polyline points="340,400 380,350 440,310 480,360 540,300 600,340" fill="none" stroke="#ff006e" stroke-width="1"/>
</g>

<!-- Title label -->
<text x="300" y="775" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff006e" opacity=".5" letter-spacing="5">NEON GRID // RETRO-WAVE</text>
</svg>
