<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
<defs>
  <filter id="g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="g2"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="600" height="800" fill="#040810"/>

<!-- PCB grid background -->
<g stroke="#00ff88" stroke-width=".3" opacity=".07">
  <line x1="0" y1="40"  x2="600" y2="40"/> <line x1="0" y1="80"  x2="600" y2="80"/>
  <line x1="0" y1="120" x2="600" y2="120"/><line x1="0" y1="160" x2="600" y2="160"/>
  <line x1="0" y1="200" x2="600" y2="200"/><line x1="0" y1="240" x2="600" y2="240"/>
  <line x1="0" y1="280" x2="600" y2="280"/><line x1="0" y1="320" x2="600" y2="320"/>
  <line x1="0" y1="360" x2="600" y2="360"/><line x1="0" y1="400" x2="600" y2="400"/>
  <line x1="0" y1="440" x2="600" y2="440"/><line x1="0" y1="480" x2="600" y2="480"/>
  <line x1="0" y1="520" x2="600" y2="520"/><line x1="0" y1="560" x2="600" y2="560"/>
  <line x1="0" y1="600" x2="600" y2="600"/><line x1="0" y1="640" x2="600" y2="640"/>
  <line x1="0" y1="680" x2="600" y2="680"/><line x1="0" y1="720" x2="600" y2="720"/>
  <line x1="0" y1="760" x2="600" y2="760"/>
  <line x1="40"  y1="0" x2="40"  y2="800"/><line x1="80"  y1="0" x2="80"  y2="800"/>
  <line x1="120" y1="0" x2="120" y2="800"/><line x1="160" y1="0" x2="160" y2="800"/>
  <line x1="200" y1="0" x2="200" y2="800"/><line x1="240" y1="0" x2="240" y2="800"/>
  <line x1="280" y1="0" x2="280" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
  <line x1="360" y1="0" x2="360" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
  <line x1="440" y1="0" x2="440" y2="800"/><line x1="480" y1="0" x2="480" y2="800"/>
  <line x1="520" y1="0" x2="520" y2="800"/><line x1="560" y1="0" x2="560" y2="800"/>
</g>

<!-- circuit traces -->
<g stroke="#00ff88" stroke-width="1.5" fill="none" filter="url(#g)" opacity=".75">
  <!-- main horizontal bus -->
  <polyline points="40,200 200,200 200,160 400,160 400,200 560,200"/>
  <polyline points="40,400 120,400 120,360 280,360 280,400 480,400 480,360 560,360"/>
  <polyline points="40,600 160,600 160,560 320,560 320,600 520,600 520,560 560,560"/>

  <!-- vertical connections -->
  <polyline points="200,200 200,280 240,280 240,360"/>
  <polyline points="400,200 400,280 360,280 360,360"/>
  <polyline points="120,400 120,480 160,480 160,560"/>
  <polyline points="480,400 480,480 440,480 440,560"/>
  <polyline points="280,400 280,480 320,480 320,560"/>

  <!-- diagonal-style jogs -->
  <polyline points="80,200 80,240 120,240 120,280 160,280 160,200"/>
  <polyline points="440,160 440,120 480,120 480,80 520,80 520,120 560,120 560,160"/>
</g>

<!-- secondary traces pink -->
<g stroke="#ff006e" stroke-width="1" fill="none" filter="url(#g)" opacity=".5">
  <polyline points="0,100 80,100 80,160 160,160"/>
  <polyline points="440,160 440,80 360,80 360,40 300,40"/>
  <polyline points="0,700 80,700 80,640 200,640 200,680 320,680 320,640 440,640 440,700 600,700"/>
  <polyline points="560,400 560,440 520,440 520,480 480,480"/>
</g>

<!-- via dots -->
<g filter="url(#g2)">
  <circle cx="200" cy="200" r="6" fill="none" stroke="#00ff88" stroke-width="2" opacity=".9"/>
  <circle cx="400" cy="200" r="6" fill="none" stroke="#00ff88" stroke-width="2" opacity=".9"/>
  <circle cx="120" cy="400" r="6" fill="none" stroke="#00ff88" stroke-width="2" opacity=".9"/>
  <circle cx="480" cy="400" r="6" fill="none" stroke="#00ff88" stroke-width="2" opacity=".9"/>
  <circle cx="280" cy="400" r="6" fill="none" stroke="#00ff88" stroke-width="2" opacity=".9"/>
  <circle cx="160" cy="560" r="5" fill="none" stroke="#ff006e" stroke-width="1.5" opacity=".8"/>
  <circle cx="320" cy="560" r="5" fill="none" stroke="#ff006e" stroke-width="1.5" opacity=".8"/>
  <circle cx="520" cy="600" r="5" fill="none" stroke="#ff006e" stroke-width="1.5" opacity=".8"/>
  <!-- filled vias -->
  <circle cx="240" cy="280" r="4" fill="#00ff88" opacity=".7"/>
  <circle cx="360" cy="280" r="4" fill="#00ff88" opacity=".7"/>
  <circle cx="160" cy="480" r="4" fill="#00ff88" opacity=".7"/>
  <circle cx="440" cy="480" r="4" fill="#00ff88" opacity=".7"/>
  <circle cx="440" cy="120" r="4" fill="#ff006e" opacity=".7"/>
  <circle cx="360" cy="80"  r="4" fill="#ff006e" opacity=".7"/>
</g>

<!-- IC chip components -->
<g fill="none" stroke="#00d4ff" stroke-width="1.5" opacity=".6">
  <!-- chip 1 -->
  <rect x="220" y="180" width="80" height="40" rx="2"/>
  <line x1="230" y1="180" x2="230" y2="170"/><line x1="242" y1="180" x2="242" y2="170"/>
  <line x1="254" y1="180" x2="254" y2="170"/><line x1="266" y1="180" x2="266" y2="170"/>
  <line x1="278" y1="220" x2="278" y2="230"/><line x1="266" y1="220" x2="266" y2="230"/>
  <line x1="254" y1="220" x2="254" y2="230"/><line x1="242" y1="220" x2="242" y2="230"/>
  <!-- chip 2 -->
  <rect x="210" y="380" width="100" height="40" rx="2"/>
  <line x1="220" y1="380" x2="220" y2="370"/><line x1="234" y1="380" x2="234" y2="370"/>
  <line x1="248" y1="380" x2="248" y2="370"/><line x1="262" y1="380" x2="262" y2="370"/>
  <line x1="276" y1="380" x2="276" y2="370"/><line x1="290" y1="380" x2="290" y2="370"/>
</g>

<!-- capacitor symbols -->
<g stroke="#00ff88" stroke-width="1.5" opacity=".5">
  <line x1="75" y1="240" x2="85" y2="240"/>
  <line x1="75" y1="248" x2="85" y2="248"/>
  <line x1="120" y1="272" x2="120" y2="288"/>
</g>

<!-- glow center bloom -->
<radialGradient id="bloom" cx="50%" cy="50%" r="50%">
  <stop offset="0%"   stop-color="#00ff88" stop-opacity=".07"/>
  <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
</radialGradient>
<rect width="600" height="800" fill="url(#bloom)"/>

<text x="300" y="775" text-anchor="middle" font-family="monospace" font-size="11" fill="#00ff88" opacity=".45" letter-spacing="5">GHOST CIRCUIT // PCB-01</text>
</svg>
