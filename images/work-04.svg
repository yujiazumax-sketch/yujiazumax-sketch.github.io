<!-- corner brackets UI -->
<g stroke="#ff006e" stroke-width="1.5" fill="none" opacity=".6">
  <polyline points="50,140 50,100 90,100"/>
  <polyline points="550,140 550,100 510,100"/>
  <polyline points="50,480 50,520 90,520"/>
  <polyline points="550,480 550,520 510,520"/>
