<!-- bottom bio text -->
<g font-family="monospace" font-size="9" fill="#00d4ff" opacity=".35">
  <text x="300" y="600" text-anchor="middle">NEURAL_PATTERN: CONFIRMED</text>
  <text x="300" y="614" text-anchor="middle">IDENTITY: SYNTHETIC_SOUL_v7</text>
