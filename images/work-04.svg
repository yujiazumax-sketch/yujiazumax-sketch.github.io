<!-- face silhouette as data lines -->
<!-- head outline (ellipse) -->
<ellipse cx="300" cy="310" rx="140" ry="180" fill="none" stroke="#00d4ff" stroke-width="1" opacity=".35"/>

<!-- facial features - eyes -->
<g filter="url(#gf)" opacity=".9">
  <ellipse cx="255" cy="270" rx="25" ry="12" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <circle  cx="255" cy="270" r="6" fill="#00d4ff" opacity=".7"/>
  <circle  cx="255" cy="270" r="3" fill="#ffffff" opacity=".9"/>
  <ellipse cx="345" cy="270" rx="25" ry="12" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <circle  cx="345" cy="270" r="6" fill="#00d4ff" opacity=".7"/>
  <circle  cx="345" cy="270" r="3" fill="#ffffff" opacity=".9"/>
</g>
<!-- eye glow -->
<g filter="url(#gs)" opacity=".4">
  <circle cx="255" cy="270" r="15" fill="#00d4ff"/>
  <circle cx="345" cy="270" r="15" fill="#00d4ff"/>
</g>

<!-- nose bridge -->
<line x1="300" y1="285" x2="300" y2="320" stroke="#00d4ff" stroke-width=".8" opacity=".3"/>
<line x1="285" y1="320" x2="315" y2="320" stroke="#00d4ff" stroke-width=".8" opacity=".3"/>

<!-- mouth -->
<path d="M268,355 Q300,375 332,355" fill="none" stroke="#ff006e" stroke-width="1.5" opacity=".6"/>

