    <stop offset="0%"   stop-color="#03030d"/>
    <stop offset="100%" stop-color="#080816"/>
  </linearGradient>
  <filter id="gf"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gs"><feGaussianBlur stdDeviation="8"/></filter>
</defs>
<rect width="600" height="800" fill="url(#bg4)"/>

