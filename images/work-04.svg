  <text x="60"  y="212">VER: 2.1.7</text>
  <text x="60"  y="224">CONF: 98.4%</text>
  <text x="60"  y="236">MODE: SCAN</text>
  <text x="458" y="200">RES: 4K</text>
  <text x="458" y="212">FPS: 120</text>
  <text x="458" y="224">NET: MESH</text>
