  <polygon points="300,241 330,258 330,291 300,308 270,291 270,258"/>
  <polygon points="360,241 390,258 390,291 360,308 330,291 330,258"/>
  <polygon points="240,241 270,258 270,291 240,308 210,291 210,258"/>
  <polygon points="420,241 450,258 450,291 420,308 390,291 390,258"/>
  <polygon points="300,308 330,325 330,358 300,375 270,358 270,325"/>
