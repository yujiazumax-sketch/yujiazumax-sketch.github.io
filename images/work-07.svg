<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
<defs>
  <radialGradient id="iris" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#001a40"/>
    <stop offset="40%"  stop-color="#003366"/>
    <stop offset="70%"  stop-color="#004488"/>
    <stop offset="100%" stop-color="#001122"/>
  </radialGradient>
  <radialGradient id="pupil" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#000005"/>
    <stop offset="80%" stop-color="#000010"/>
    <stop offset="100%" stop-color="#001122"/>
  </radialGradient>
  <filter id="glow7"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="soft7"><feGaussianBlur stdDeviation="10"/></filter>
  <filter id="sm7"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="600" height="800" fill="#020208"/>

<!-- Background circuit traces -->
<g stroke="#00d4ff" stroke-width=".4" fill="none" opacity=".06">
  <line x1="0"   y1="200" x2="180" y2="200"/><line x1="420" y1="200" x2="600" y2="200"/>
  <line x1="0"   y1="600" x2="180" y2="600"/><line x1="420" y1="600" x2="600" y2="600"/>
  <line x1="50"  y1="0"   x2="50"  y2="280"/><line x1="50"  y1="520" x2="50"  y2="800"/>
  <line x1="550" y1="0"   x2="550" y2="280"/><line x1="550" y1="520" x2="550" y2="800"/>
  <polyline points="50,200 80,200 80,160 120,160 120,200"/>
  <polyline points="550,200 520,200 520,160 480,160 480,200"/>
  <polyline points="50,600 80,600 80,640 120,640 120,600"/>
  <polyline points="550,600 520,600 520,640 480,640 480,600"/>
</g>

<!-- outer eye glow -->
<ellipse cx="300" cy="400" rx="240" ry="140" fill="none" stroke="#00d4ff" stroke-width="1" opacity=".15" filter="url(#soft7)"/>

<!-- Eye white -->
<ellipse cx="300" cy="400" rx="230" ry="130" fill="#080820"/>

<!-- Eye outline (lids) -->
<path d="M70,400 Q180,250 300,240 Q420,250 530,400 Q420,550 300,560 Q180,550 70,400Z"
      fill="#060615" stroke="#00d4ff" stroke-width="1.2" opacity=".7"/>

<!-- Iris -->
<circle cx="300" cy="400" r="120" fill="url(#iris)"/>
<circle cx="300" cy="400" r="120" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity=".5"/>

<!-- Iris detail lines (spokes) -->
<g stroke="#0066cc" stroke-width=".7" opacity=".4">
  <line x1="300" y1="280" x2="300" y2="520"/>
  <line x1="196" y1="315" x2="404" y2="485"/>
  <line x1="196" y1="485" x2="404" y2="315"/>
  <line x1="180" y1="400" x2="420" y2="400"/>
  <line x1="216" y1="300" x2="384" y2="500"/>
  <line x1="216" y1="500" x2="384" y2="300"/>
  <line x1="248" y1="290" x2="352" y2="510"/>
  <line x1="248" y1="510" x2="352" y2="290"/>
</g>

<!-- Iris rings -->
<circle cx="300" cy="400" r="100" fill="none" stroke="#0055aa" stroke-width=".6" opacity=".5"/>
<circle cx="300" cy="400" r="80"  fill="none" stroke="#0044aa" stroke-width=".6" opacity=".45"/>
<circle cx="300" cy="400" r="60"  fill="none" stroke="#0033aa" stroke-width=".6" opacity=".4"/>

<!-- Circuit pattern inside iris -->
<g stroke="#00aaff" stroke-width=".8" fill="none" opacity=".3" filter="url(#sm7)">
  <polyline points="300,310 320,310 320,330 340,330 340,350"/>
  <polyline points="300,310 280,310 280,330 260,330 260,350"/>
  <polyline points="340,450 340,470 320,470 320,490 300,490"/>
  <polyline points="260,450 260,470 280,470 280,490 300,490"/>
</g>

<!-- Pupil -->
<circle cx="300" cy="400" r="48"  fill="url(#pupil)"/>
<circle cx="300" cy="400" r="48"  fill="none" stroke="#00d4ff" stroke-width="1" opacity=".6"/>

<!-- Pupil inner glow -->
<circle cx="300" cy="400" r="30" fill="#001122" opacity=".8"/>
<circle cx="300" cy="400" r="48" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#glow7)" opacity=".5"/>

<!-- Highlight reflection -->
<ellipse cx="275" cy="375" rx="12" ry="8" fill="white" opacity=".15" transform="rotate(-20,275,375)"/>
<ellipse cx="320" cy="385" rx="4"  ry="3" fill="white" opacity=".08"/>

<!-- Data scan line through eye -->
<line x1="0" y1="400" x2="600" y2="400" stroke="#00d4ff" stroke-width=".5" opacity=".3"/>
<rect x="0" y="396" width="600" height="8" fill="#00d4ff" opacity=".03"/>

<!-- Upper eyelid shadow -->
<path d="M70,400 Q180,250 300,240 Q420,250 530,400" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity=".4"/>

<!-- Lower eyelid -->
<path d="M70,400 Q180,550 300,560 Q420,550 530,400" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity=".4"/>

<!-- UI corner overlays -->
<g stroke="#ff006e" stroke-width="1.2" fill="none" opacity=".55">
  <polyline points="30,100 30,50 80,50"/>
  <polyline points="570,100 570,50 520,50"/>
  <polyline points="30,700 30,750 80,750"/>
  <polyline points="570,700 570,750 520,750"/>
</g>

<!-- HUD text -->
<g font-family="monospace" font-size="8" fill="#00d4ff" opacity=".35">
  <text x="40" y="160">RETINAL_SCAN</text>
  <text x="40" y="172">MATCH: 99.7%</text>
  <text x="40" y="184">DEPTH: FOCUS</text>
  <text x="440" y="160">OCULAR_ID</text>
  <text x="440" y="172">IRIS_HASH:</text>
  <text x="440" y="184">0xF3A9D2</text>
  <text x="40" y="640">SECTOR: ALPHA</text>
  <text x="40" y="652">ACCESS: LEVEL5</text>
  <text x="440" y="640">DILATION: 4mm</text>
  <text x="440" y="652">VECTOR: CLEAR</text>
</g>

<text x="300" y="775" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4ff" opacity=".45" letter-spacing="5">VOID EYE // SCAN-0047</text>
</svg>
