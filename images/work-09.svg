<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
<defs>
  <radialGradient id="portal" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#00ffff" stop-opacity=".6"/>
    <stop offset="20%"  stop-color="#0088ff" stop-opacity=".4"/>
    <stop offset="50%"  stop-color="#4400ff" stop-opacity=".25"/>
    <stop offset="100%" stop-color="#000020" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="void" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#000015"/>
    <stop offset="60%"  stop-color="#010120"/>
    <stop offset="100%" stop-color="#020228"/>
  </radialGradient>
  <radialGradient id="bg9" cx="50%" cy="50%" r="60%">
    <stop offset="0%"   stop-color="#050528"/>
    <stop offset="100%" stop-color="#010108"/>
  </radialGradient>
  <filter id="gf9"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="soft9"><feGaussianBlur stdDeviation="12"/></filter>
  <filter id="sm9"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="600" height="800" fill="url(#bg9)"/>

<!-- Stars in background -->
<g fill="#ffffff">
  <circle cx="50"  cy="50"  r="1"   opacity=".6"/>
  <circle cx="150" cy="80"  r="1.2" opacity=".7"/>
  <circle cx="250" cy="40"  r=".8"  opacity=".5"/>
  <circle cx="350" cy="70"  r="1"   opacity=".65"/>
  <circle cx="450" cy="30"  r="1.2" opacity=".7"/>
  <circle cx="550" cy="60"  r=".8"  opacity=".5"/>
  <circle cx="80"  cy="180" r="1"   opacity=".5"/>
  <circle cx="520" cy="150" r="1"   opacity=".5"/>
  <circle cx="30"  cy="600" r=".8"  opacity=".4"/>
  <circle cx="570" cy="650" r=".8"  opacity=".4"/>
  <circle cx="100" cy="720" r="1"   opacity=".5"/>
  <circle cx="500" cy="730" r=".9"  opacity=".5"/>
</g>

<!-- Outer glow -->
<circle cx="300" cy="400" r="240" fill="url(#portal)" filter="url(#soft9)" opacity=".8"/>

<!-- Concentric rings (outer to inner) -->
<g fill="none" cx="300" cy="400">
  <!-- Ring 7 -->
  <circle cx="300" cy="400" r="230" stroke="#1122ff" stroke-width=".6" opacity=".2"/>
  <!-- Ring 6 -->
  <circle cx="300" cy="400" r="205" stroke="#2244ff" stroke-width=".8" opacity=".3"/>
  <!-- Ring 5 -->
  <circle cx="300" cy="400" r="180" stroke="#3366ff" stroke-width="1"   opacity=".4"/>
  <!-- Ring 4 -->
  <circle cx="300" cy="400" r="155" stroke="#0088ff" stroke-width="1.2" opacity=".5" filter="url(#sm9)"/>
  <!-- Ring 3 -->
  <circle cx="300" cy="400" r="128" stroke="#00aaff" stroke-width="1.5" opacity=".6" filter="url(#sm9)"/>
  <!-- Ring 2 -->
  <circle cx="300" cy="400" r="100" stroke="#00ccff" stroke-width="2"   opacity=".75" filter="url(#gf9)"/>
  <!-- Ring 1 (innermost bright) -->
  <circle cx="300" cy="400" r="70"  stroke="#00ffff" stroke-width="2.5" opacity=".9"  filter="url(#gf9)"/>
</g>

<!-- Void center -->
<circle cx="300" cy="400" r="60" fill="url(#void)"/>
<circle cx="300" cy="400" r="55" fill="#000010" opacity=".95"/>

<!-- Portal center glow -->
<circle cx="300" cy="400" r="30" fill="#00ffff" opacity=".08" filter="url(#soft9)"/>
<circle cx="300" cy="400" r="15" fill="#00ffff" opacity=".2"  filter="url(#gf9)"/>
<circle cx="300" cy="400" r="6"  fill="#ffffff"  opacity=".8"/>

<!-- Radial energy lines (like spokes) -->
<g stroke="#00aaff" stroke-width=".6" opacity=".35" filter="url(#sm9)">
  <line x1="300" y1="170" x2="300" y2="340"/><!-- top -->
  <line x1="300" y1="460" x2="300" y2="630"/><!-- bottom -->
  <line x1="70"  y1="400" x2="230" y2="400"/><!-- left -->
  <line x1="370" y1="400" x2="530" y2="400"/><!-- right -->
  <!-- diagonals -->
  <line x1="137" y1="237" x2="253" y2="353"/>
  <line x1="463" y1="237" x2="347" y2="353"/>
  <line x1="137" y1="563" x2="253" y2="447"/>
  <line x1="463" y1="563" x2="347" y2="447"/>
</g>

<!-- Energy particles along rings -->
<g fill="#00ffff" opacity=".9" filter="url(#gf9)">
  <!-- on ring r=70 -->
  <circle cx="300" cy="330" r="2.5"/>
  <circle cx="370" cy="400" r="2.5"/>
  <circle cx="300" cy="470" r="2.5"/>
  <circle cx="230" cy="400" r="2.5"/>
  <!-- on ring r=100 -->
  <circle cx="300" cy="300" r="2"/>
  <circle cx="400" cy="400" r="2"/>
  <circle cx="300" cy="500" r="2"/>
  <circle cx="200" cy="400" r="2"/>
  <!-- diagonal on r=100 -->
  <circle cx="371" cy="329" r="1.8"/>
  <circle cx="371" cy="471" r="1.8"/>
  <circle cx="229" cy="329" r="1.8"/>
  <circle cx="229" cy="471" r="1.8"/>
</g>
<g fill="#0088ff" opacity=".7" filter="url(#sm9)">
  <circle cx="300" cy="245" r="2"/>
  <circle cx="427" cy="272" r="2"/>
  <circle cx="455" cy="400" r="2"/>
  <circle cx="427" cy="528" r="2"/>
  <circle cx="300" cy="555" r="2"/>
  <circle cx="173" cy="528" r="2"/>
  <circle cx="145" cy="400" r="2"/>
  <circle cx="173" cy="272" r="2"/>
</g>

<!-- Distortion lines (perspective tunnel effect) -->
<g stroke="#001144" stroke-width=".5" opacity=".4">
  <line x1="300" y1="400" x2="80"  y2="100"/>
  <line x1="300" y1="400" x2="300" y2="50"/>
  <line x1="300" y1="400" x2="520" y2="100"/>
  <line x1="300" y1="400" x2="570" y2="400"/>
  <line x1="300" y1="400" x2="520" y2="700"/>
  <line x1="300" y1="400" x2="300" y2="760"/>
  <line x1="300" y1="400" x2="80"  y2="700"/>
  <line x1="300" y1="400" x2="30"  y2="400"/>
</g>

<!-- Corner UI brackets -->
<g stroke="#00aaff" stroke-width="1" fill="none" opacity=".5">
  <polyline points="20,80 20,30 70,30"/>
  <polyline points="580,80 580,30 530,30"/>
  <polyline points="20,720 20,770 70,770"/>
  <polyline points="580,720 580,770 530,770"/>
</g>

<!-- Data labels -->
<g font-family="monospace" font-size="8" fill="#00aaff" opacity=".35">
  <text x="30" y="140">GATE: OPEN</text>
  <text x="30" y="152">SECTOR: ∞</text>
  <text x="30" y="164">STAB: 99%</text>
  <text x="430" y="140">MASS: VOID</text>
  <text x="430" y="152">FREQ: 4.9THz</text>
  <text x="430" y="164">VEC: STABLE</text>
</g>

<text x="300" y="775" text-anchor="middle" font-family="monospace" font-size="11" fill="#00ccff" opacity=".5" letter-spacing="5">WARP GATE // SECTOR-∞</text>
</svg>
