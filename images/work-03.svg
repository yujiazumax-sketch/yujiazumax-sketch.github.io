<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
<defs>
  <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#050510"/>
    <stop offset="100%" stop-color="#0a0820"/>
  </linearGradient>
  <!-- refraction spectrum -->
  <linearGradient id="spec" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#ff006e" stop-opacity=".9"/>
    <stop offset="16%"  stop-color="#ff4400" stop-opacity=".85"/>
    <stop offset="33%"  stop-color="#ffcc00" stop-opacity=".8"/>
    <stop offset="50%"  stop-color="#00ff88" stop-opacity=".85"/>
    <stop offset="66%"  stop-color="#00d4ff" stop-opacity=".85"/>
    <stop offset="83%"  stop-color="#bf00ff" stop-opacity=".85"/>
    <stop offset="100%" stop-color="#ff006e" stop-opacity=".8"/>
  </linearGradient>
  <filter id="g3"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
</defs>
<rect width="600" height="800" fill="url(#bg3)"/>

<!-- scattered particles bg -->
<g fill="#00d4ff" opacity=".12">
  <circle cx="50"  cy="100" r="1.5"/><circle cx="150" cy="80"  r="1"/><circle cx="500" cy="120" r="1.5"/>
  <circle cx="70"  cy="600" r="1"/  ><circle cx="530" cy="700" r="1.5"/><circle cx="30"  cy="400" r="1"/>
  <circle cx="570" cy="300" r="1"/  ><circle cx="300" cy="30"  r="1.5"/><circle cx="420" cy="750" r="1"/>
</g>

<!-- prism body -->
<polygon points="300,80 520,680 80,680" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity=".6"/>
<polygon points="300,80 520,680 80,680" fill="rgba(0,212,255,.03)"/>

<!-- prism inner glow -->
<polygon points="300,80 520,680 80,680" fill="rgba(0,212,255,.04)" filter="url(#soft)"/>

<!-- incident light ray (left side of prism) -->
<g filter="url(#g3)">
  <line x1="0" y1="300" x2="230" y2="420" stroke="#ffffff" stroke-width="2" opacity=".7"/>
  <line x1="0" y1="300" x2="230" y2="420" stroke="#ffffff" stroke-width="8" opacity=".08"/>
</g>

<!-- refracted spectrum rays (right side) -->
<g opacity=".75" filter="url(#g3)">
  <line x1="232" y1="421" x2="600" y2="350" stroke="#ff006e" stroke-width="1.8"/>
  <line x1="232" y1="422" x2="600" y2="365" stroke="#ff4400" stroke-width="1.8"/>
  <line x1="233" y1="423" x2="600" y2="385" stroke="#ffcc00" stroke-width="1.8"/>
  <line x1="234" y1="424" x2="600" y2="405" stroke="#00ff88" stroke-width="1.8"/>
  <line x1="234" y1="425" x2="600" y2="425" stroke="#00d4ff" stroke-width="1.8"/>
  <line x1="235" y1="426" x2="600" y2="445" stroke="#0088ff" stroke-width="1.8"/>
  <line x1="236" y1="427" x2="600" y2="465" stroke="#bf00ff" stroke-width="1.8"/>
</g>

<!-- spectrum band fill (soft) -->
<g opacity=".18" filter="url(#soft)">
  <polygon points="232,418 600,340 600,480 232,432" fill="url(#spec)"/>
</g>

<!-- prism edge glow corners -->
<g filter="url(#g3)" opacity=".8">
  <circle cx="300" cy="80"  r="5" fill="#00d4ff"/>
  <circle cx="520" cy="680" r="5" fill="#00d4ff"/>
  <circle cx="80"  cy="680" r="5" fill="#00d4ff"/>
</g>

<!-- floating geometric accents -->
<g fill="none" opacity=".35">
  <polygon points="80,120 110,70 140,120" stroke="#00d4ff" stroke-width="1"/>
  <polygon points="460,100 490,55 520,100" stroke="#ff006e" stroke-width="1"/>
  <polygon points="50,700 80,655 110,700"  stroke="#00ff88" stroke-width="1"/>
  <rect x="530" y="680" width="40" height="40" stroke="#bf00ff" stroke-width="1" transform="rotate(15,550,700)"/>
</g>

<!-- scanlines overlay -->
<g stroke="#00d4ff" stroke-width=".3" opacity=".04">
  <line x1="0" y1="50"  x2="600" y2="50"/> <line x1="0" y1="100" x2="600" y2="100"/>
  <line x1="0" y1="150" x2="600" y2="150"/><line x1="0" y1="200" x2="600" y2="200"/>
  <line x1="0" y1="250" x2="600" y2="250"/><line x1="0" y1="300" x2="600" y2="300"/>
  <line x1="0" y1="350" x2="600" y2="350"/><line x1="0" y1="400" x2="600" y2="400"/>
  <line x1="0" y1="450" x2="600" y2="450"/><line x1="0" y1="500" x2="600" y2="500"/>
  <line x1="0" y1="550" x2="600" y2="550"/><line x1="0" y1="600" x2="600" y2="600"/>
  <line x1="0" y1="650" x2="600" y2="650"/><line x1="0" y1="700" x2="600" y2="700"/>
</g>

<text x="300" y="775" text-anchor="middle" font-family="monospace" font-size="11" fill="#bf00ff" opacity=".5" letter-spacing="5">PRISM // LIGHT-REFRACTION</text>
</svg>
