  <text transform="translate(300,400) rotate(15)  translate(175,0) rotate(90)">10</text>
  <text transform="translate(300,400) rotate(30)  translate(175,0) rotate(90)">11</text>
  <text transform="translate(300,400) rotate(45)  translate(175,0) rotate(90)">00</text>
