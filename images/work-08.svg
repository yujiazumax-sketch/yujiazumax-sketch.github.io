<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
<defs>
  <radialGradient id="center8" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#ff006e" stop-opacity=".4"/>
    <stop offset="40%"  stop-color="#bf00ff" stop-opacity=".2"/>
    <stop offset="100%" stop-color="#000010" stop-opacity="0"/>
  </radialGradient>
  <filter id="gf8"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="600" height="800" fill="#030308"/>

<!-- Background glow -->
<ellipse cx="300" cy="400" rx="250" ry="280" fill="url(#center8)"/>

<!-- Spiral of binary / hex chars -->
<!-- Ring 1 (innermost, r≈40) -->
<g font-family="monospace" font-size="10" fill="#ff006e" filter="url(#gf8)" opacity=".9">
  <text transform="translate(300,400) rotate(0)   translate(40,0) rotate(90)">1</text>
  <text transform="translate(300,400) rotate(45)  translate(40,0) rotate(90)">0</text>
  <text transform="translate(300,400) rotate(90)  translate(40,0) rotate(90)">1</text>
  <text transform="translate(300,400) rotate(135) translate(40,0) rotate(90)">1</text>
  <text transform="translate(300,400) rotate(180) translate(40,0) rotate(90)">0</text>
  <text transform="translate(300,400) rotate(225) translate(40,0) rotate(90)">0</text>
  <text transform="translate(300,400) rotate(270) translate(40,0) rotate(90)">1</text>
  <text transform="translate(300,400) rotate(315) translate(40,0) rotate(90)">0</text>
</g>

<!-- Ring 2 (r≈70) -->
<g font-family="monospace" font-size="9" fill="#cc00cc" filter="url(#gf8)" opacity=".8">
