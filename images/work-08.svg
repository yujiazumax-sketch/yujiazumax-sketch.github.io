  <text transform="translate(300,400) rotate(30)  translate(70,0) rotate(90)">1</text>
  <text transform="translate(300,400) rotate(60)  translate(70,0) rotate(90)">1</text>
  <text transform="translate(300,400) rotate(90)  translate(70,0) rotate(90)">0</text>
  <text transform="translate(300,400) rotate(120) translate(70,0) rotate(90)">1</text>
  <text transform="translate(300,400) rotate(150) translate(70,0) rotate(90)">0</text>
  <text transform="translate(300,400) rotate(180) translate(70,0) rotate(90)">0</text>
  <text transform="translate(300,400) rotate(210) translate(70,0) rotate(90)">1</text>
  <text transform="translate(300,400) rotate(240) translate(70,0) rotate(90)">1</text>
  <text transform="translate(300,400) rotate(270) translate(70,0) rotate(90)">0</text>
  <text transform="translate(300,400) rotate(300) translate(70,0) rotate(90)">0</text>
  <text transform="translate(300,400) rotate(330) translate(70,0) rotate(90)">1</text>
</g>

<!-- Ring 3 (r≈100) -->
