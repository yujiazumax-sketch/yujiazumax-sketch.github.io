  <text transform="translate(300,400) rotate(240) translate(175,0) rotate(90)">00</text>
  <text transform="translate(300,400) rotate(255) translate(175,0) rotate(90)">10</text>
  <text transform="translate(300,400) rotate(270) translate(175,0) rotate(90)">11</text>
  <text transform="translate(300,400) rotate(285) translate(175,0) rotate(90)">01</text>
  <text transform="translate(300,400) rotate(300) translate(175,0) rotate(90)">00</text>
  <text transform="translate(300,400) rotate(315) translate(175,0) rotate(90)">10</text>
  <text transform="translate(300,400) rotate(330) translate(175,0) rotate(90)">11</text>
  <text transform="translate(300,400) rotate(345) translate(175,0) rotate(90)">01</text>
</g>

<!-- center core -->
<circle cx="300" cy="400" r="22" fill="#ff006e" opacity=".8" filter="url(#gf8)"/>
<circle cx="300" cy="400" r="14" fill="#ffffff" opacity=".9"/>
<circle cx="300" cy="400" r="7"  fill="#ff006e" opacity="1"/>

<!-- ring outlines (glowing) -->
<g fill="none" filter="url(#gf8)" opacity=".35">
  <circle cx="300" cy="400" r="40"  stroke="#ff006e"  stroke-width="1"/>
  <circle cx="300" cy="400" r="70"  stroke="#cc00cc"  stroke-width=".8"/>
  <circle cx="300" cy="400" r="100" stroke="#9900ff"  stroke-width=".7"/>
  <circle cx="300" cy="400" r="135" stroke="#7700cc"  stroke-width=".6"/>
  <circle cx="300" cy="400" r="175" stroke="#5500aa"  stroke-width=".5"/>
</g>

<text x="300" y="775" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff006e" opacity=".45" letter-spacing="5">BINARY BLOOM // GEN-08</text>
</svg>
